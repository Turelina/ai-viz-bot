# AI agent configuration

agents:
  # 1. Listener Agent
  listener:
    name: "Listener Agent"
    description: "Classifies incoming messages and routes them"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 3000
    temperature: 0.3
    timeout: 30
    retry_attempts: 2
    features:
      - message_classification
      - intent_detection
      - routing

  # 2. Manager Agent
  manager:
    name: "Manager Agent"
    description: "Communicates with clients, gathers requirements, and manages orders"
    model: "claude-sonnet-4-6"
    max_tokens: 15000
    temperature: 0.7
    timeout: 60
    retry_attempts: 3
    features:
      - requirements_gathering
      - pricing_calculation
      - quality_control
      - client_communication
    context:
      max_messages: 10
      include_order_summary: true

  # 3. Vision Agent
  vision:
    name: "Vision Agent"
    description: "Analyzes payment screenshots"
    model: "claude-sonnet-4-6"
    max_tokens: 8000
    temperature: 0.1
    timeout: 45
    retry_attempts: 3
    confidence_threshold: 0.9
    features:
      - payment_verification
      - image_analysis
      - amount_extraction
      - date_extraction

  # 4. Engineer Agent
  engineer:
    name: "Engineer Agent"
    description: "Creates technical prompts for image generators"
    model: "claude-sonnet-4-6"
    max_tokens: 10000
    temperature: 0.5
    timeout: 60
    retry_attempts: 2
    features:
      - prompt_engineering
      - parameter_selection
      - style_optimization
    supported_generators:
      - imagen3
      - dalle3
      - midjourney

  # 5. Generator Agent
  generator:
    name: "Generator Agent"
    description: "Manages the image-generation process"
    model: null  # Almost no AI in the MVP
    max_tokens: 1000
    temperature: 0.3
    timeout: 15
    mode: "manual"  # manual | auto
    features:
      - instruction_generation
      - platform_selection
      - status_tracking

  # 6. Delivery Agent
  delivery:
    name: "Delivery Agent"
    description: "Delivers results to clients"
    model: "claude-haiku-4-5-20251001"
    max_tokens: 3000
    temperature: 0.6
    timeout: 30
    retry_attempts: 2
    features:
      - file_delivery
      - feedback_collection
      - completion_notification

# Global settings for all agents
global_settings:
  # Prompt caching
  enable_prompt_caching: true
  cache_ttl: 3600

  # Logging
  log_all_interactions: true
  log_token_usage: true

  # Error handling
  default_retry_attempts: 2
  default_timeout: 45
  exponential_backoff: true

  # Context
  default_max_context_messages: 10
  compress_old_context: true

  # Security
  sanitize_inputs: true
  validate_outputs: true

# Model priorities (fallback)
model_fallbacks:
  claude-sonnet-4-6:
    - claude-haiku-4-5-20251001

  claude-haiku-4-5-20251001: []

# Usage limits
usage_limits:
  # Token limits
  max_tokens_per_message: 5000
  max_tokens_per_order: 50000
  max_tokens_per_day: 500000

  # Request limits
  max_requests_per_minute: 30
  max_requests_per_hour: 500

  # Cost limits
  max_cost_per_order_usd: 2.0
  max_cost_per_day_usd: 50.0

# Monitoring and metrics
monitoring:
  # Values to track
  track_response_time: true
  track_token_usage: true
  track_success_rate: true
  track_errors: true

  # Alert thresholds
  alert_on_slow_response: 60  # Seconds
  alert_on_high_token_usage: 40000  # Per order
  alert_on_error_rate: 0.1  # 10%

# Token optimization
token_optimization:
  # Context compression
  compress_messages: true
  max_message_length: 2000

  # Smart summarization
  summarize_old_context: true
  summary_threshold_messages: 20

  # Caching
  cache_system_prompts: true
  cache_user_preferences: true
  cache_pricing_tables: true
